<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Owner | YINYUNQING</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html#top" aria-label="返回首页">
        <span class="brand-mark">雲</span>
        <span class="brand-text">YINYUNQING Owner</span>
      </a>
    </header>

    <main class="owner-main">
      <section class="owner-login" data-owner-login>
        <div class="section-heading stacked-heading">
          <p class="eyebrow">Owner</p>
          <h1>拥有者界面</h1>
        </div>

        <form class="owner-form owner-login-form" data-owner-login-form>
          <label>
            <span>账号</span>
            <input name="username" autocomplete="username" required />
          </label>
          <label>
            <span>密码</span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-link" type="submit">登录</button>
          <p class="owner-message" data-owner-login-message role="status" aria-live="polite"></p>
        </form>
      </section>

      <section class="owner-dashboard" data-owner-dashboard hidden>
        <div class="section-heading stacked-heading">
          <p class="eyebrow">Dashboard</p>
          <h1>内容管理</h1>
        </div>

        <div class="owner-actions">
          <a class="primary-link" href="index.html#works">查看首页</a>
          <button class="secondary-button" type="button" data-owner-export>导出 JSON</button>
          <button class="secondary-button" type="button" data-owner-logout>退出登录</button>
        </div>

        <div class="owner-panels">
          <section class="owner-panel">
            <h2>添加项目经历</h2>
            <form class="owner-form" data-owner-form="experience">
              <label>
                <span>时间</span>
                <input name="date" placeholder="2026.06" required />
              </label>
              <label>
                <span>项目名称</span>
                <input name="title" required />
              </label>
              <label>
                <span>职责</span>
                <input name="role" required />
              </label>
              <button class="primary-link" type="submit">添加</button>
            </form>
            <div class="owner-list" data-owner-list="experience"></div>
          </section>

          <section class="owner-panel">
            <h2>添加重点项目</h2>
            <form class="owner-form" data-owner-form="featured">
              <label>
                <span>分类标签</span>
                <input name="tag" placeholder="Independent Game Studio" required />
              </label>
              <label>
                <span>标题</span>
                <input name="title" required />
              </label>
              <label>
                <span>说明</span>
                <textarea name="description" rows="4" required></textarea>
              </label>
              <label>
                <span>图片路径或 URL</span>
                <input name="image" placeholder="assets/example.png" />
              </label>
              <label>
                <span>跳转链接</span>
                <input name="url" placeholder="works/example.html" />
              </label>
              <button class="primary-link" type="submit">添加</button>
            </form>
            <div class="owner-list" data-owner-list="featured"></div>
          </section>

          <section class="owner-panel">
            <h2>添加音乐作品</h2>
            <form class="owner-form" data-owner-form="music">
              <label>
                <span>作品名</span>
                <input name="title" required />
              </label>
              <label>
                <span>说明</span>
                <input name="meta" placeholder="原创音乐作品" required />
              </label>
              <label>
                <span>作品链接</span>
                <input name="url" type="url" required />
              </label>
              <button class="primary-link" type="submit">添加</button>
            </form>
            <div class="owner-list" data-owner-list="music"></div>
          </section>

          <section class="owner-panel">
            <h2>添加美术作品</h2>
            <form class="owner-form" data-owner-form="illustration">
              <label>
                <span>作品名</span>
                <input name="title" required />
              </label>
              <label>
                <span>引文/说明</span>
                <textarea name="quote" rows="3" required></textarea>
              </label>
              <label>
                <span>图片路径或 URL</span>
                <input name="image" placeholder="assets/example.png" required />
              </label>
              <label>
                <span>作品链接</span>
                <input name="url" placeholder="works/example.html" required />
              </label>
              <button class="primary-link" type="submit">添加</button>
            </form>
            <div class="owner-list" data-owner-list="illustration"></div>
          </section>
        </div>

        <textarea class="owner-export" data-owner-export-output readonly hidden></textarea>
      </section>
    </main>

    <script src="owner.js"></script>
  </body>
</html>
